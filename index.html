<!DOCTYPE html>
<!-- ============================================================
  日本 観光来訪者数マップ
  - 単一HTMLファイルで完結（CSS・JavaScriptをこのファイルに内包）
  - GitHub Pages でそのまま公開できる静的サイト
  ============================================================ -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホでも正しく表示されるよう画面幅に合わせる指示 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本 観光来訪者数マップ</title>

  <!-- D3.js：グラフ・地図を描くためのライブラリ（インターネット上から読み込む） -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <!-- topojson-client：地図データ（TopoJSON形式）をD3が扱える形に変換するライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <style>
    /* ========== リセット ==========
       ブラウザごとのデフォルトスタイルの差をなくす */
    * {
      box-sizing: border-box; /* 幅の計算にpaddingを含める */
      margin: 0;
      padding: 0;
    }

    /* ========== ページ全体 ========== */
    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;    /* ページの高さを画面の高さに合わせる */
      display: flex;
      flex-direction: column; /* header・main・footer を縦に並べる */
    }

    /* ========== ヘッダー ========== */
    header {
      background: #1a237e; /* 紺色 */
      color: white;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: bold;
    }

    /* ========== メインエリア（地図を置く場所） ========== */
    main {
      flex: 1; /* ヘッダーとフッターの間を埋めるよう縦に伸びる */
      display: flex;
      align-items: center;    /* 垂直方向：中央揃え */
      justify-content: center; /* 水平方向：中央揃え */
      padding: 24px;
    }

    /* ========== フッター ========== */
    footer {
      background: #eee;
      color: #666;
      font-size: 0.75rem;
      text-align: center;
      padding: 12px 16px;
    }

    footer a {
      color: #555;
    }

    /* ========== 地図コンテナ ==========
       SVGを画面幅に合わせてレスポンシブに表示する */
    #map-container {
      width: 100%;
      max-width: 800px; /* PC画面では最大800pxに制限 */
    }

    #map-container svg {
      width: 100%;
      height: auto;  /* viewBoxの比率を保ったまま縮小 */
      display: block;
    }

    /* 都道府県の境界線（塗り色はJavaScriptがデータに基づいて設定する） */
    #map-container path {
      stroke: #fff;
      stroke-width: 0.5;
    }

    /* ホバー時にカーソルをポインター（手の形）にする */
    #map-container path.pref,
    #map-container path.okinawa {
      cursor: pointer;
    }

    /* 読み込み中テキスト */
    #loading {
      color: #888;
      font-size: 0.95rem;
    }

    /* ========== ツールチップ ==========
       カーソルに追従する小さな吹き出し。
       position: fixed = スクロール位置に関係なく画面上の絶対位置で表示
       pointer-events: none = ツールチップ自身がマウスイベントを邪魔しないようにする */
    #tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none; /* 初期状態は非表示 */
      white-space: nowrap; /* 都道府県名を折り返さない */
    }

  </style>
</head>
<body>

  <!-- ========== ヘッダー ========== -->
  <header>
    <h1>日本 観光来訪者数マップ（2026年3月）</h1>
  </header>

  <!-- ========== メインエリア ==========
       JavaScriptがここにSVG地図を挿入する -->
  <main id="app">
    <div id="map-container">
      <!-- 地図が読み込まれるまで表示するメッセージ -->
      <p id="loading">地図データを読み込み中...</p>
    </div>
  </main>

  <!-- ========== ツールチップ ==========
       JavaScriptがカーソル位置に合わせてここを移動・表示/非表示する -->
  <div id="tooltip"></div>

  <!-- ========== フッター（出典クレジット） ========== -->
  <footer>
    出典：<a href="https://www.nihon-kankou.or.jp/home/jigyou/research/d-toukei/" target="_blank">デジタル観光統計オープンデータ</a>を加工して作成（2026年3月利用）
  </footer>

  <script>
    // ================================================================
    // データ取得先
    // ================================================================
    const MAP_URL = "https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson";
    const CSV_URL = "data/city202603_utf8.csv"; // 観光来訪者数（市区町村単位）
    const POP_URL = "data/population_pref.csv"; // 都道府県別人口（総務省 住民基本台帳）

    // SVG仮想キャンバスのサイズ（実際の表示サイズはCSSが制御する）
    const WIDTH  = 800;
    const HEIGHT = 700;

    // ----------------------------------------------------------------
    // 沖縄インセット（左上の小枠）の設定
    // ----------------------------------------------------------------
    const INSET_X = 8;
    const INSET_Y = 8;
    const INSET_W = 440;
    const INSET_H = 340;

    // SVG要素を作成（viewBoxでレスポンシブ対応）
    const svg = d3.select("#map-container")
      .append("svg")
      .attr("viewBox", `0 0 ${WIDTH} ${HEIGHT}`);

    // ① 本土用の投影（緯度経度 → 画面XY座標）
    const mainProjection = d3.geoMercator()
      .center([136, 37.5])
      .scale(1850)
      .translate([WIDTH / 2 + 40, HEIGHT / 2 + 20]);

    // ② 沖縄インセット用の投影（126°E 中心で石垣島まで収める）
    const okinawaProjection = d3.geoMercator()
      .center([126, 26])
      .scale(4000)
      .translate([INSET_W / 2, INSET_H / 2]);

    const mainPath    = d3.geoPath().projection(mainProjection);
    const okinawaPath = d3.geoPath().projection(okinawaProjection);

    // ================================================================
    // 地図・観光データ・人口データを同時に読み込む
    // Promise.all = 複数の非同期処理を並行して実行し、全部終わったら次へ進む
    // ================================================================
    Promise.all([
      d3.json(MAP_URL),
      d3.csv(CSV_URL),
      d3.csv(POP_URL)
    ]).then(([topology, csvRows, popRows]) => {

      document.getElementById("loading").remove();

      // ----------------------------------------------------------------
      // 観光CSVを都道府県ごとの来訪者数合計に集計する
      // 結果は Map（辞書）形式：{ "北海道" => 1234567, ... }
      // ----------------------------------------------------------------
      const visitorsMap = d3.rollup(
        csvRows,
        rows => d3.sum(rows, d => +d["人数"]),
        d => d["都道府県名"]
      );

      // ----------------------------------------------------------------
      // 人口CSVを { "北海道" => 5044825, ... } の辞書に変換する
      // ----------------------------------------------------------------
      const popMap = new Map(popRows.map(d => [d["都道府県名"], +d["人口"]]));

      // ----------------------------------------------------------------
      // 人口比率を計算する：来訪者数 ÷ 人口 × 100 = 「人口100人中X人」
      // 絶対数ではなく比率にすることで東京一極集中を避けられる
      // ----------------------------------------------------------------
      const ratioMap = new Map();
      for (const [pref, visitors] of visitorsMap) {
        const pop = popMap.get(pref);
        if (pop) ratioMap.set(pref, (visitors / pop) * 100);
      }

      // ----------------------------------------------------------------
      // 色スケール：人口比率0〜最大値 → 薄い赤〜濃い赤
      // ----------------------------------------------------------------
      const maxRatio = d3.max(ratioMap.values());
      const colorScale = d3.scaleSequential()
        .domain([0, maxRatio])
        .interpolator(d3.interpolateReds);

      // 都道府県フィーチャーから塗り色を返すヘルパー関数
      const getFill = d => {
        const ratio = ratioMap.get(d.properties.nam_ja) || 0;
        return colorScale(ratio);
      };

      // 数値を「1,234,567」形式にフォーマットするヘルパー関数
      const fmt = n => n.toLocaleString("ja-JP");

      // TopoJSON → GeoJSONに変換し、本土と沖縄に分ける
      const features = topojson.feature(topology, topology.objects.japan).features;
      const mainland  = features.filter(f => f.properties.nam_ja !== "沖縄県");
      const okinawa   = features.filter(f => f.properties.nam_ja === "沖縄県");

      const tooltip = d3.select("#tooltip");

      // ----------------------------------------------------------------
      // マウスイベントのハンドラ（本土・沖縄で共通）
      // ----------------------------------------------------------------

      // カーソルが乗ったとき：境界線を強調＋ツールチップ表示
      const onOver = (event, d) => {
        d3.select(event.currentTarget)
          .attr("stroke", "#1a237e")   // 境界線を紺色に
          .attr("stroke-width", 2);
        const pref     = d.properties.nam_ja;
        const visitors = visitorsMap.get(pref) || 0;
        const ratio    = ratioMap.get(pref);
        const ratioStr = ratio != null ? ratio.toFixed(1) : "—";
        tooltip
          .style("display", "block")
          .html(
            `<strong>${pref}</strong><br>` +
            `来訪者数：${fmt(visitors)} 人<br>` +
            `人口比率：${ratioStr}%（人口100人中${ratioStr}人）`
          );
      };

      // カーソルが動いたとき：ツールチップをカーソルの右上に追従
      const onMove = (event) => {
        tooltip
          .style("left", (event.clientX + 14) + "px")
          .style("top",  (event.clientY - 34) + "px");
      };

      // カーソルが離れたとき：境界線を元に戻す＋ツールチップ非表示
      const onOut = (event) => {
        d3.select(event.currentTarget)
          .attr("stroke", "#fff")
          .attr("stroke-width", 0.5);
        tooltip.style("display", "none");
      };

      // ---- 本土の都道府県を描画 ----
      svg.selectAll("path.pref")
        .data(mainland)
        .enter()
        .append("path")
        .attr("class", "pref")
        .attr("d", mainPath)
        .attr("fill", getFill)  // 来訪者数に応じた色を設定
        .on("mouseover", onOver)
        .on("mousemove", onMove)
        .on("mouseout", onOut);

      // ---- 沖縄インセットの作成 ----
      // clipPath：枠からはみ出した島を非表示にする
      svg.append("defs")
        .append("clipPath")
        .attr("id", "okinawa-clip")
        .append("rect")
        .attr("width", INSET_W)
        .attr("height", INSET_H);

      const inset = svg.append("g")
        .attr("transform", `translate(${INSET_X}, ${INSET_Y})`);

      // 背景枠
      inset.append("rect")
        .attr("width", INSET_W)
        .attr("height", INSET_H)
        .attr("fill", "#e8eef4")
        .attr("stroke", "#aaa")
        .attr("stroke-width", 1)
        .attr("rx", 3);

      // 沖縄の島々を描画（clipPathで枠外を切り抜き）
      inset.append("g")
        .attr("clip-path", "url(#okinawa-clip)")
        .selectAll("path.okinawa")
        .data(okinawa)
        .enter()
        .append("path")
        .attr("class", "okinawa")
        .attr("d", okinawaPath)
        .attr("fill", getFill)  // 本土と同じ色スケールを適用
        .on("mouseover", onOver)
        .on("mousemove", onMove)
        .on("mouseout", onOut);

      // 「沖縄県」ラベル
      inset.append("text")
        .attr("x", 6)
        .attr("y", INSET_H - 6)
        .attr("font-size", "10px")
        .attr("fill", "#555")
        .text("沖縄県");

    }).catch(() => {
      document.getElementById("loading").textContent =
        "データの読み込みに失敗しました。インターネット接続とファイルの存在を確認してください。";
    });
  </script>
</body>
</html>
