<!DOCTYPE html>
<!-- ============================================================
  日本 観光来訪者数マップ
  - 単一HTMLファイルで完結（CSS・JavaScriptをこのファイルに内包）
  - GitHub Pages でそのまま公開できる静的サイト
  ============================================================ -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホでも正しく表示されるよう画面幅に合わせる指示 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本 観光来訪者数マップ</title>

  <!-- D3.js：グラフ・地図を描くためのライブラリ（インターネット上から読み込む） -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <!-- topojson-client：地図データ（TopoJSON形式）をD3が扱える形に変換するライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <style>
    /* ========== リセット ==========
       ブラウザごとのデフォルトスタイルの差をなくす */
    * {
      box-sizing: border-box; /* 幅の計算にpaddingを含める */
      margin: 0;
      padding: 0;
    }

    /* ========== ページ全体 ========== */
    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;    /* ページの高さを画面の高さに合わせる */
      display: flex;
      flex-direction: column; /* header・main・footer を縦に並べる */
    }

    /* ========== ヘッダー ========== */
    header {
      background: #1a237e; /* 紺色 */
      color: white;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: bold;
    }

    /* ========== メインエリア（地図を置く場所） ========== */
    main {
      flex: 1; /* ヘッダーとフッターの間を埋めるよう縦に伸びる */
      display: flex;
      align-items: center;    /* 垂直方向：中央揃え */
      justify-content: center; /* 水平方向：中央揃え */
      padding: 24px;
    }

    /* ========== フッター ========== */
    footer {
      background: #eee;
      color: #666;
      font-size: 0.75rem;
      text-align: center;
      padding: 12px 16px;
    }

    footer a {
      color: #555;
    }

    /* ========== 地図コンテナ ==========
       SVGを画面幅に合わせてレスポンシブに表示する */
    #map-container {
      width: 100%;
      max-width: 800px;
    }

    /* ========== モード切替トグルスイッチ ==========
       position: fixed = スクロールしても画面右上に常に固定される
       スマホ・PCどちらでも地図と重ならず操作しやすい */
    #mode-toggle-wrap {
      position: fixed;
      top: 70px;  /* ヘッダーの高さ分だけ下げる */
      right: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.92);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
      z-index: 10; /* 地図SVGより手前に表示 */
    }

    /* トグルのラベル：非アクティブは薄く、アクティブは太字 */
    .toggle-label {
      color: #aaa;
      transition: color 0.2s;
    }
    .toggle-label.active {
      color: #333;
      font-weight: bold;
    }

    /* チェックボックスをスライドスイッチに見せるCSS */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    /* 実際のチェックボックスは非表示にする */
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    /* スイッチの土台（トラック）：来訪者数モード（薄い赤） */
    .toggle-knob {
      position: absolute;
      inset: 0;
      background: #e57373;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }
    /* スイッチのつまみ（白い丸） */
    .toggle-knob::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    /* チェック状態（人口比モード）：赤系に変色し、つまみが右に移動 */
    .toggle-switch input:checked + .toggle-knob {
      background: #c62828;
    }
    .toggle-switch input:checked + .toggle-knob::before {
      transform: translateX(20px);
    }

    #map-container svg {
      width: 100%;
      height: auto;  /* viewBoxの比率を保ったまま縮小 */
      display: block;
    }

    /* 都道府県の境界線（塗り色はJavaScriptがデータに基づいて設定する） */
    #map-container path {
      stroke: #fff;
      stroke-width: 0.5;
    }

    /* ホバー時にカーソルをポインター（手の形）にする */
    #map-container path.pref,
    #map-container path.okinawa {
      cursor: pointer;
    }

    /* 読み込み中テキスト */
    #loading {
      color: #888;
      font-size: 0.95rem;
    }

    /* ========== ビュー切り替え ========== */
    /* 地図ビュー：幅いっぱいに広げて中央揃え */
    #view-map {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* 市区町村地図ビュー：初期は非表示 */
    #view-city {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 800px;
    }

    /* ========== 市区町村地図ヘッダー ========== */
    #city-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 4px;
      border-bottom: 1px solid #ddd;
      margin-bottom: 8px;
    }

    #btn-back {
      background: #1a237e;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #btn-back:hover {
      background: #283593;
    }

    #chart-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
    }

    /* ========== 市区町村地図コンテナ ========== */
    #city-map-container {
      width: 100%;
    }

    #city-map-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    #city-map-container path.city {
      stroke: #fff;
      stroke-width: 0.5;
      cursor: default;
      transition: stroke 0.1s, stroke-width 0.1s;
    }

    #city-loading {
      color: #888;
      font-size: 0.95rem;
      padding: 16px 0;
    }

    /* ========== ツールチップ ==========
       カーソルに追従する小さな吹き出し。
       position: fixed = スクロール位置に関係なく画面上の絶対位置で表示
       pointer-events: none = ツールチップ自身がマウスイベントを邪魔しないようにする */
    #tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none; /* 初期状態は非表示 */
      white-space: nowrap; /* 都道府県名を折り返さない */
    }

  </style>
</head>
<body>

  <!-- ========== ヘッダー ========== -->
  <header>
    <h1>日本 観光来訪者数マップ（2026年3月）</h1>
  </header>

  <!-- ========== メインエリア ========== -->
  <main id="app">

    <!-- ① 都道府県地図ビュー（初期表示） -->
    <div id="view-map">
      <div id="map-container">
        <p id="loading">地図データを読み込み中...</p>
      </div>
    </div>

    <!-- ② 市区町村地図ビュー（都道府県クリック後に表示） -->
    <div id="view-city">
      <div id="city-header">
        <button id="btn-back">← 都道府県に戻る</button>
        <h2 id="city-title"></h2>
      </div>
      <div id="city-map-container"></div>
    </div>

    <!-- モード切替トグルスイッチ（画面右上に固定表示） -->
    <div id="mode-toggle-wrap">
      <span class="toggle-label active" id="label-visitors">来訪者数</span>
      <label class="toggle-switch">
        <input type="checkbox" id="mode-toggle">
        <span class="toggle-knob"></span>
      </label>
      <span class="toggle-label" id="label-ratio">人口比</span>
    </div>
  </main>

  <!-- ========== ツールチップ ==========
       JavaScriptがカーソル位置に合わせてここを移動・表示/非表示する -->
  <div id="tooltip"></div>

  <!-- ========== フッター（出典クレジット） ========== -->
  <footer>
    出典：<a href="https://www.nihon-kankou.or.jp/home/jigyou/research/d-toukei/" target="_blank">デジタル観光統計オープンデータ</a>を加工して作成（2026年3月利用）
  </footer>

  <script>
    // ================================================================
    // データ取得先
    // ================================================================
    const MAP_URL = "https://raw.githubusercontent.com/dataofjapan/land/master/japan.topojson";
    const CSV_URL = "data/city202603_utf8.csv"; // 観光来訪者数（市区町村単位）
    const POP_URL = "data/population_pref.csv"; // 都道府県別人口（総務省 住民基本台帳）

    // SVG仮想キャンバスのサイズ（実際の表示サイズはCSSが制御する）
    const WIDTH  = 800;
    const HEIGHT = 700;

    // ----------------------------------------------------------------
    // 沖縄インセット（左上の小枠）の設定
    // ----------------------------------------------------------------
    const INSET_X = 8;
    const INSET_Y = 8;
    const INSET_W = 440;
    const INSET_H = 340;

    // 現在の表示モード："visitors"（観光者数）or "ratio"（人口比）
    let mode = "visitors";

    // SVG要素を作成（viewBoxでレスポンシブ対応）
    const svg = d3.select("#map-container")
      .append("svg")
      .attr("viewBox", `0 0 ${WIDTH} ${HEIGHT}`);

    // ① 本土用の投影（緯度経度 → 画面XY座標）
    const mainProjection = d3.geoMercator()
      .center([136, 37.5])
      .scale(1850)
      .translate([WIDTH / 2 + 40, HEIGHT / 2 + 20]);

    // ② 沖縄インセット用の投影（126°E 中心で石垣島まで収める）
    const okinawaProjection = d3.geoMercator()
      .center([126, 26])
      .scale(4000)
      .translate([INSET_W / 2, INSET_H / 2]);

    const mainPath    = d3.geoPath().projection(mainProjection);
    const okinawaPath = d3.geoPath().projection(okinawaProjection);

    // ================================================================
    // 地図・観光データ・人口データを同時に読み込む
    // Promise.all = 複数の非同期処理を並行して実行し、全部終わったら次へ進む
    // ================================================================
    Promise.all([
      d3.json(MAP_URL),
      d3.csv(CSV_URL),
      d3.csv(POP_URL)
    ]).then(([topology, csvRows, popRows]) => {

      document.getElementById("loading").remove();

      // ----------------------------------------------------------------
      // 観光CSVを都道府県ごとの来訪者数合計に集計する
      // 結果は Map（辞書）形式：{ "北海道" => 1234567, ... }
      // ----------------------------------------------------------------
      const visitorsMap = d3.rollup(
        csvRows,
        rows => d3.sum(rows, d => +d["人数"]),
        d => d["都道府県名"]
      );

      // ----------------------------------------------------------------
      // 人口CSVを { "北海道" => 5044825, ... } の辞書に変換する
      // ----------------------------------------------------------------
      const popMap = new Map(popRows.map(d => [d["都道府県名"], +d["人口"]]));

      // ----------------------------------------------------------------
      // 人口比率を計算する：来訪者数 ÷ 人口 × 100 = 「人口100人中X人」
      // 絶対数ではなく比率にすることで東京一極集中を避けられる
      // ----------------------------------------------------------------
      const ratioMap = new Map();
      for (const [pref, visitors] of visitorsMap) {
        const pop = popMap.get(pref);
        if (pop) ratioMap.set(pref, (visitors / pop) * 100);
      }

      // ----------------------------------------------------------------
      // 連続赤スケール：最小値→薄い赤、最大値→濃い赤
      //
      // domain を [0, 最大値] でなく [最小値, 最大値] にする理由：
      // 全都道府県に必ず来訪者がいるため 0 を使うと色の差が潰れる。
      // 実際のデータの幅だけを使うことで赤のグラデーションをフルに活用できる。
      //
      // interpolateReds(0.2 + 0.8 * t) にする理由：
      // t=0 の素の interpolateReds はほぼ白になるため、
      // 下限を 0.2 にずらして最小値でも「薄い赤」が見えるようにする。
      // ----------------------------------------------------------------
      const redsInterpolator = t => d3.interpolateReds(0.2 + 0.8 * t);

      const visitorsScale = d3.scaleSequential()
        .domain([d3.min(visitorsMap.values()), d3.max(visitorsMap.values())])
        .interpolator(redsInterpolator);

      const ratioScale = d3.scaleSequential()
        .domain([d3.min(ratioMap.values()), d3.max(ratioMap.values())])
        .interpolator(redsInterpolator);

      // 現在のモードに応じて塗り色を返すヘルパー関数
      const getFill = d => {
        const pref = d.properties.nam_ja;
        return mode === "visitors"
          ? visitorsScale(visitorsMap.get(pref) || 0)
          : ratioScale(ratioMap.get(pref) || 0);
      };

      // 数値を「1,234,567」形式にフォーマットするヘルパー関数
      const fmt = n => n.toLocaleString("ja-JP");

      // TopoJSON → GeoJSONに変換し、本土と沖縄に分ける
      const features = topojson.feature(topology, topology.objects.japan).features;
      const mainland  = features.filter(f => f.properties.nam_ja !== "沖縄県");
      const okinawa   = features.filter(f => f.properties.nam_ja === "沖縄県");

      const tooltip = d3.select("#tooltip");

      // ----------------------------------------------------------------
      // マウスイベントのハンドラ（本土・沖縄で共通）
      // ----------------------------------------------------------------

      // カーソルが乗ったとき：境界線を強調＋ツールチップ表示
      const onOver = (event, d) => {
        d3.select(event.currentTarget)
          .attr("stroke", "#1a237e")   // 境界線を紺色に
          .attr("stroke-width", 2);
        const pref     = d.properties.nam_ja;
        const visitors = visitorsMap.get(pref) || 0;
        const ratio    = ratioMap.get(pref);
        const ratioStr = ratio != null ? ratio.toFixed(1) : "—";
        tooltip
          .style("display", "block")
          .html(
            `<strong>${pref}</strong><br>` +
            `来訪者数：${fmt(visitors)} 人<br>` +
            `人口比率：${ratioStr}%（人口100人中${ratioStr}人）`
          );
      };

      // カーソルが動いたとき：ツールチップをカーソルの右上に追従
      const onMove = (event) => {
        tooltip
          .style("left", (event.clientX + 14) + "px")
          .style("top",  (event.clientY - 34) + "px");
      };

      // カーソルが離れたとき：境界線を元に戻す＋ツールチップ非表示
      const onOut = (event) => {
        d3.select(event.currentTarget)
          .attr("stroke", "#fff")
          .attr("stroke-width", 0.5);
        tooltip.style("display", "none");
      };

      // ---- 本土の都道府県を描画 ----
      svg.selectAll("path.pref")
        .data(mainland)
        .enter()
        .append("path")
        .attr("class", "pref")
        .attr("d", mainPath)
        .attr("fill", getFill)
        .on("mouseover", onOver)
        .on("mousemove", onMove)
        .on("mouseout", onOut)
        .on("click", (event, d) => showCityMap(d.properties.nam_ja)); // クリックで棒グラフへ

      // ---- 沖縄インセットの作成 ----
      // clipPath：枠からはみ出した島を非表示にする
      svg.append("defs")
        .append("clipPath")
        .attr("id", "okinawa-clip")
        .append("rect")
        .attr("width", INSET_W)
        .attr("height", INSET_H);

      const inset = svg.append("g")
        .attr("transform", `translate(${INSET_X}, ${INSET_Y})`);

      // 背景枠
      inset.append("rect")
        .attr("width", INSET_W)
        .attr("height", INSET_H)
        .attr("fill", "#e8eef4")
        .attr("stroke", "#aaa")
        .attr("stroke-width", 1)
        .attr("rx", 3);

      // 沖縄の島々を描画（clipPathで枠外を切り抜き）
      inset.append("g")
        .attr("clip-path", "url(#okinawa-clip)")
        .selectAll("path.okinawa")
        .data(okinawa)
        .enter()
        .append("path")
        .attr("class", "okinawa")
        .attr("d", okinawaPath)
        .attr("fill", getFill)
        .on("mouseover", onOver)
        .on("mousemove", onMove)
        .on("mouseout", onOut)
        .on("click", (event, d) => showCityMap(d.properties.nam_ja));

      // 「沖縄県」ラベル
      inset.append("text")
        .attr("x", 6)
        .attr("y", INSET_H - 6)
        .attr("font-size", "10px")
        .attr("fill", "#555")
        .text("沖縄県");

      // ================================================================
      // 市区町村地図ビューの表示
      // ================================================================

      // 都道府県名 → 2桁ゼロパディングコード（URL構築に使う）
      // 例: "北海道" → "01", "東京都" → "13"
      const prefCodeMap = new Map(
        csvRows.map(d => [
          d["都道府県名"],
          String(+d["都道府県コード"]).padStart(2, "0")
        ])
      );

      // 全国市区町村GeoJSON（初回クリック時に取得してキャッシュ）
      // 都道府県別ファイルは不完全なため、全国一括ファイルを使う
      const CITY_GEO_URL =
        "https://raw.githubusercontent.com/smartnews-smri/japan-topography" +
        "/main/data/municipality/geojson/s0010/N03-21_210101.json";
      let cityGeoCache = null; // 一度取得したらここに保存して再取得しない

      // 都道府県クリック時：市区町村の地図を描画する（非同期）
      const showCityMap = async (prefName) => {
        const prefCode = prefCodeMap.get(prefName);

        // ビューを切り替え・読み込み中を表示
        document.getElementById("view-map").style.display = "none";
        document.getElementById("mode-toggle-wrap").style.display = "none";
        document.getElementById("view-city").style.display = "flex";
        document.getElementById("city-title").textContent = prefName;
        tooltip.style("display", "none");

        const container = document.getElementById("city-map-container");
        container.innerHTML = '<p id="city-loading">市区町村データを読み込み中...</p>';

        // この都道府県の市区町村データをMapに変換
        // CSV地域コードを5桁ゼロパディングして N03_007 と突合できるようにする
        const cityDataMap = new Map(
          csvRows
            .filter(d => d["都道府県名"] === prefName)
            .map(d => [
              String(+d["地域コード"]).padStart(5, "0"),
              { count: +d["人数"], name: d["地域名称"] }
            ])
        );

        // 全国GeoJSONを取得（2回目以降はキャッシュを使用）
        if (!cityGeoCache) {
          try {
            cityGeoCache = await d3.json(CITY_GEO_URL);
          } catch {
            container.innerHTML =
              '<p style="color:#c00;padding:16px 0">市区町村データの読み込みに失敗しました。</p>';
            return;
          }
        }

        // 2桁の都道府県コードで前方一致フィルタ（例: "13" → 13101, 13401 ...）
        const prefFeatures = cityGeoCache.features.filter(f =>
          f.properties.N03_007?.startsWith(prefCode)
        );
        const prefGeoJson = { type: "FeatureCollection", features: prefFeatures };

        container.innerHTML = "";

        // ---- SVG作成（viewBoxでレスポンシブ） ----
        const citySvg = d3.select(container)
          .append("svg")
          .attr("viewBox", `0 0 ${WIDTH} ${HEIGHT}`);

        // この都道府県の全市区町村が収まるよう投影を自動フィット
        const cityProjection = d3.geoMercator()
          .fitExtent([[20, 20], [WIDTH - 20, HEIGHT - 20]], prefGeoJson);

        const cityPathGen = d3.geoPath().projection(cityProjection);

        // 色スケール：この都道府県内の最大来訪者数を基準に
        const maxCount = d3.max([...cityDataMap.values()], v => v.count) || 1;
        const cityColorScale = d3.scaleSequential()
          .domain([0, maxCount])
          .interpolator(redsInterpolator);

        // ---- 市区町村を描画 ----
        citySvg.selectAll("path.city")
          .data(prefFeatures)
          .enter()
          .append("path")
          .attr("class", "city")
          .attr("d", cityPathGen)
          .attr("fill", f => {
            const data = cityDataMap.get(f.properties.N03_007);
            return data ? cityColorScale(data.count) : "#d0d0d0";
          })
          .on("mouseover", (event, f) => {
            const data = cityDataMap.get(f.properties.N03_007);
            const name = data?.name
              ?? [f.properties.N03_003, f.properties.N03_004].filter(Boolean).join("")
              ?? "不明";
            const countStr = data ? `${fmt(data.count)} 人` : "データなし";
            tooltip
              .style("display", "block")
              .html(`<strong>${name}</strong><br>来訪者数：${countStr}`);
            d3.select(event.currentTarget)
              .attr("stroke", "#1a237e")
              .attr("stroke-width", 1.5);
          })
          .on("mousemove", onMove)
          .on("mouseout", event => {
            tooltip.style("display", "none");
            d3.select(event.currentTarget)
              .attr("stroke", "#fff")
              .attr("stroke-width", 0.5);
          });
      };

      // 「← 都道府県に戻る」ボタン：地図ビューに戻る
      const showMap = () => {
        document.getElementById("view-city").style.display = "none";
        document.getElementById("view-map").style.display = "flex";
        document.getElementById("mode-toggle-wrap").style.display = "flex";
      };

      document.getElementById("btn-back").addEventListener("click", showMap);

      // ----------------------------------------------------------------
      // トグルスイッチの切り替えイベント
      // モードを更新 → 全都道府県を再塗色 → ラベルの強調を切り替え
      // ----------------------------------------------------------------
      document.getElementById("mode-toggle").addEventListener("change", function() {
        mode = this.checked ? "ratio" : "visitors";
        // SVG上の全都道府県パスを新しいモードの色で塗り直す
        svg.selectAll("path.pref, path.okinawa").attr("fill", getFill);
        // ラベルのアクティブ状態を切り替える
        document.getElementById("label-visitors").classList.toggle("active", mode === "visitors");
        document.getElementById("label-ratio").classList.toggle("active",   mode === "ratio");
      });

    }).catch(() => {
      document.getElementById("loading").textContent =
        "データの読み込みに失敗しました。インターネット接続とファイルの存在を確認してください。";
    });
  </script>
</body>
</html>
